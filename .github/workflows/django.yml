name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install Dependencies
      run: |
        cd requirements
        python -m pip install --upgrade pip
        pip install -r local.txt
    - name: Run Tests
      run: |
        cd Django-Shop
        pytest
